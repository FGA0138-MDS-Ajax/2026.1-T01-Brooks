name: Integração Contínua 

on:  
  push:
    branches: ["main", "developer"]
  pull_request:
    branches: ["main", "developer"]

permissions:
  contents: read

jobs:
  # 1. Job de Instalação e Cache
  setup:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: avaliaru
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24' 
          cache: 'npm'
          cache-dependency-path: avaliaru/package-lock.json

      - name: Cache Node Modules
        id: cache-node-modules
        uses: actions/cache@v4
        with:
          path: avaliaru/node_modules
          key: ${{ runner.os }}-node-${{ hashFiles('avaliaru/package-lock.json') }}

      - name: Install dependencies
        if: ${{ steps.cache-node-modules.outputs.cache-hit != 'true' }}
        run: npm ci

  # 2. Job de Lint (Depende do Setup)
  lint:
    runs-on: ubuntu-latest
    needs: setup
    defaults:
      run:
        working-directory: avaliaru
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Load Node Modules Cache
        uses: actions/cache@v4
        with:
          path: avaliaru/node_modules
          key: ${{ runner.os }}-node-${{ hashFiles('avaliaru/package-lock.json') }}

      - name: Run lint
        run: npm run lint

  # 3. Job de Testes (Depende do Setup)
  test:
    runs-on: ubuntu-latest
    needs: setup
    env: # <-- VARIÁVEL MOVIDA PARA O NÍVEL DO JOB
      DATABASE_URL: "file:./dev.db"
    defaults:
      run:
        working-directory: avaliaru
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Load Node Modules Cache
        uses: actions/cache@v4
        with:
          path: avaliaru/node_modules
          key: ${{ runner.os }}-node-${{ hashFiles('avaliaru/package-lock.json') }}

      - name: Push Database Schema
        run: npx drizzle-kit push
          
      - name: Run tests
        run: npx vitest run

  # 4. Job de Build (Só roda se o Lint e os Testes passarem)
  build:
    runs-on: ubuntu-latest
    needs: [lint, test]
    env: # <-- VARIÁVEIS MOVIDAS PARA O NÍVEL DO JOB
      DATABASE_URL: "file:./dev.db"
      AUTH_URL: http://localhost:3000
      AUTH_SECRET: ${{ secrets.AUTH_SECRET }}
    defaults:
      run:
        working-directory: avaliaru
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Load Node Modules Cache
        uses: actions/cache@v4
        with:
          path: avaliaru/node_modules
          key: ${{ runner.os }}-node-${{ hashFiles('avaliaru/package-lock.json') }}
        
      - name: Build
        run: npm run build