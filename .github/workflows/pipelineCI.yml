name: Integração Contínua 

on:  
  push:
    branches: ["main", "developer"]
  pull_request:
    branches: ["main", "developer"]

permissions:
  contents: read

jobs:
  setup:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: avaliaru
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24' 
          cache: 'npm'
          cache-dependency-path: avaliaru/package-lock.json
      - run: npm ci

  lint:
    runs-on: ubuntu-latest
    needs: setup
    defaults:
      run:
        working-directory: avaliaru
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: avaliaru/package-lock.json
      - run: npm run lint

  test:
    runs-on: ubuntu-latest
    needs: setup
    env:
      DATABASE_URL: "file:./dev.db"
      TZ: America/Sao_Paulo
    defaults:
      run:
        working-directory: avaliaru
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: avaliaru/package-lock.json
      - name: Run tests
        run: |
          npx drizzle-kit push
          npx vitest run

  build:
    runs-on: ubuntu-latest
    needs: [lint, test]
    env:
      DATABASE_URL: "file:./dev.db"
      AUTH_URL: http://localhost:3000
      AUTH_SECRET: ${{ secrets.AUTH_SECRET }}
    defaults:
      run:
        working-directory: avaliaru
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: avaliaru/package-lock.json
      - run: npm run build